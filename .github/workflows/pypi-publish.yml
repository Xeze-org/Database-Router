name: 📦 Publish xeze-dbr to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.3.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: 🚀 Build & Publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)
      contents: write  # Required for git tag

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📋 Show current PyPI version
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Package: xeze-dbr"
          echo ""
          CURRENT=$(pip index versions xeze-dbr 2>/dev/null | head -1 || echo "not found")
          echo "📌 Current PyPI version: $CURRENT"
          echo "🆕 New version to publish: ${{ github.event.inputs.version }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ✏️ Set version in source
        working-directory: sdk/python
        run: |
          sed -i "s/^version = .*/version = \"${{ github.event.inputs.version }}\"/" pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${{ github.event.inputs.version }}\"/" src/xeze_dbr/__init__.py
          echo "✅ Version set to ${{ github.event.inputs.version }}"
          grep "version" pyproject.toml | head -1
          grep "__version__" src/xeze_dbr/__init__.py

      - name: 📦 Install build tools
        run: pip install build

      - name: 🔨 Build package
        working-directory: sdk/python
        run: python -m build

      - name: 🚀 Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

      - name: 🏷️ Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "pypi-v${{ github.event.inputs.version }}" -m "xeze-dbr v${{ github.event.inputs.version }}"
          git push origin "pypi-v${{ github.event.inputs.version }}"
