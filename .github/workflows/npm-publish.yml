name: 📦 Publish @xeze/dbr to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.3.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: 🚀 Build & Publish
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          registry-url: 'https://registry.npmjs.org'

      - name: 📋 Show current npm version
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Package: @xeze/dbr"
          echo ""
          CURRENT=$(npm view @xeze/dbr version 2>/dev/null || echo "not found")
          echo "📌 Current npm version: $CURRENT"
          echo "🆕 New version to publish: ${{ github.event.inputs.version }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: ✏️ Set version in source
        working-directory: sdk/node
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          echo "✅ Version set to ${{ github.event.inputs.version }}"

      - name: 📦 Install dependencies
        working-directory: sdk/node
        run: npm ci || npm install

      - name: 🚀 Publish to npm (Trusted Publishing with Provenance)
        working-directory: sdk/node
        run: npm publish --access public --provenance
        # No NODE_AUTH_TOKEN needed! The id-token permission enables OIDC automatically.

      - name: 🏷️ Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "npm-v${{ github.event.inputs.version }}" -m "@xeze/dbr v${{ github.event.inputs.version }}"
          git push origin "npm-v${{ github.event.inputs.version }}"
