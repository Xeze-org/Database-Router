name: Gitea Runner Test
run-name: ${{ github.actor }} is testing the Gitea runner
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Run a simple echo
        run: echo "The Gitea runner is working properly!"
      - name: Print environment variables
        run: env
      - name: Test Docker availability
        run: docker info || echo "Docker is not available on this runner"
