<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Router Diagnostics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.4);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(236, 72, 153, 0.3);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            z-index: 1;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a8a29e, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .results-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .db-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .db-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--text-muted);
            transition: background 0.3s ease;
        }

        .db-card.success::before { background: var(--success); }
        .db-card.error::before { background: var(--error); }

        .db-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .db-title {
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .db-icon {
            width: 24px;
            height: 24px;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-weight: 600;
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-muted);
        }

        .db-card.success .status-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .db-card.error .status-badge {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .db-data {
            font-family: monospace;
            font-size: 0.85rem;
            color: #cbd5e1;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.75rem;
            border-radius: 8px;
            word-break: break-all;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .spinner { display: inline-block; }
        button.loading .btn-text { display: none; }

    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div class="glass-panel">
            <h1>Database Router</h1>
            <p class="subtitle">Secure mTLS Connection established via Google Cloud Run</p>
            
            <button id="runBtn" onclick="runDiagnostics()">
                <span class="btn-text">Run Diagnostics</span>
                <div class="spinner"></div>
            </button>

            <div class="results-grid" id="resultsGrid">
                
                <!-- PostgreSQL -->
                <div class="db-card" id="card-postgres">
                    <div class="db-header">
                        <div class="db-title">🐘 PostgreSQL</div>
                        <div class="status-badge" id="status-postgres">Pending</div>
                    </div>
                    <div class="db-data" id="data-postgres">Awaiting test...</div>
                </div>

                <!-- MongoDB -->
                <div class="db-card" id="card-mongodb">
                    <div class="db-header">
                        <div class="db-title">🍃 MongoDB</div>
                        <div class="status-badge" id="status-mongodb">Pending</div>
                    </div>
                    <div class="db-data" id="data-mongodb">Awaiting test...</div>
                </div>

                <!-- Redis -->
                <div class="db-card" id="card-redis">
                    <div class="db-header">
                        <div class="db-title">🟥 Redis</div>
                        <div class="status-badge" id="status-redis">Pending</div>
                    </div>
                    <div class="db-data" id="data-redis">Awaiting test...</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function runDiagnostics() {
            const btn = document.getElementById('runBtn');
            const grid = document.getElementById('resultsGrid');
            
            // Reset UI
            btn.classList.add('loading');
            btn.disabled = true;
            grid.classList.remove('visible');
            
            ['postgres', 'mongodb', 'redis'].forEach(db => {
                const card = document.getElementById(`card-${db}`);
                card.className = 'db-card';
                document.getElementById(`status-${db}`).innerText = 'Testing...';
                document.getElementById(`status-${db}`).style.color = '';
                document.getElementById(`data-${db}`).innerText = 'Connecting...';
            });

            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                
                grid.classList.add('visible');

                if (data.status === 'success') {
                    updateCard('postgres', data.tests.postgres, val => JSON.stringify(val.latest_row));
                    updateCard('mongodb', data.tests.mongodb, val => `Inserted ID:\n${val.inserted_id}`);
                    updateCard('redis', data.tests.redis, val => `Cached Value:\n${val.cached_value}`);
                } else {
                    alert("System Error: " + data.message);
                }

            } catch (error) {
                alert("Network error occurred: " + error.message);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                grid.classList.add('visible');
            }
        }

        function updateCard(dbName, result, formatSuccess) {
            const card = document.getElementById(`card-${dbName}`);
            const statusBadge = document.getElementById(`status-${dbName}`);
            const dataEl = document.getElementById(`data-${dbName}`);

            if (result && result.status === 'OK') {
                card.classList.add('success');
                statusBadge.innerText = 'Online';
                dataEl.innerText = formatSuccess(result);
            } else {
                card.classList.add('error');
                statusBadge.innerText = 'Failed';
                dataEl.innerText = result ? result.error : 'Unknown error';
            }
        }
    </script>
</body>
</html>
