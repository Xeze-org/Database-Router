<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mTLS Secure Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <div class="glass-container">
        <header>
            <div class="badge">db-router + postgres</div>
            <h1>Secure Tasks</h1>
            <p>Protected by end-to-end mTLS</p>
        </header>

        <form id="todo-form">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit" class="btn-primary">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </form>

        <div class="todo-list-container">
            <ul id="todo-list">
                <!-- Tasks injected by JS -->
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
