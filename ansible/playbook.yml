---
# ansible-playbook playbook.yml
#
# Deploys the full db-router stack:
#   1. Docker + Docker Compose
#   2. db-router (PostgreSQL, MongoDB, Redis, gRPC server, Web UI)
#   3. Caddy reverse proxy (auto-HTTPS for domain)

- name: Deploy db-router
  hosts: dbrouter
  become: true

  roles:
    - docker
    - dbrouter
    - caddy
