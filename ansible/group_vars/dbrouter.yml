---
# ── Domain ─────────────────────────────────────────────────────────────
domain: "db.0.xeze.org"

# ── Ports ──────────────────────────────────────────────────────────────
grpc_port: 50051
webui_port: 8080

# ── Database credentials ──────────────────────────────────────────────
# Override with --extra-vars or ansible-vault
postgres_user: "admin"
postgres_password: "CHANGE_ME"
postgres_db: "unified_db"

mongo_user: "admin"
mongo_password: "CHANGE_ME"

redis_password: "CHANGE_ME"

# ── mTLS ──────────────────────────────────────────────────────────────
enable_mtls: true

# ── Caddy ─────────────────────────────────────────────────────────────
caddy_email: "admin@xeze.org"
