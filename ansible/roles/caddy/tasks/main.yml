---
- name: Install Caddy prerequisites
  apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present

- name: Add Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy.asc
    mode: "0644"

- name: Add Caddy repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/caddy.asc]
      https://dl.cloudsmith.io/public/caddy/stable/deb/debian
      any-version main
    state: present
    filename: caddy

- name: Install Caddy
  apt:
    name: caddy
    state: present
    update_cache: true

- name: Create Caddy log directory
  file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: "0755"

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
  notify: reload caddy

- name: Format Caddyfile
  command: caddy fmt --overwrite /etc/caddy/Caddyfile
  changed_when: false

- name: Start and enable Caddy
  systemd:
    name: caddy
    state: restarted
    enabled: true

- name: Check if UFW is installed
  command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Open HTTP/HTTPS in UFW
  when: ufw_check.rc == 0
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"

