# db-router — standalone deploy
# ============================================================
# Use this if you already have PostgreSQL / MongoDB / Redis
# running elsewhere. Just point config.json at them.
#
# Quick start:
#   1. cp config.example.json config.json
#   2. Edit config.json with your DB connection details
#   3. docker compose up -d
#
# The router will be available on grpc://localhost:50051
# Protect it with Caddy/Envoy (or any gRPC-aware reverse proxy).
# ============================================================

services:
  db-router:
    image: ghcr.io/xeze/db-router:latest
    container_name: db_router
    restart: unless-stopped

    # config.json and certs/ are mounted read-only at runtime.
    # The image contains no credentials — safe to share publicly.
    # Run certs/gen-certs.sh (or gen-certs.ps1) to create TLS certificates first.
    volumes:
      - ./config.json:/app/config.json:ro
      - ./certs:/app/certs:ro

    ports:
      - "127.0.0.1:50051:50051"   # localhost only — put Envoy/Caddy in front

    environment:
      PORT: "50051"

    # Optional resource cap — the router is very lightweight
    deploy:
      resources:
        limits:
          memory: 64M

    # gRPC health can be checked via grpc_health_probe or grpcurl
    # healthcheck:
    #   test: ["CMD", "grpc_health_probe", "-addr=:50051"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 5s
